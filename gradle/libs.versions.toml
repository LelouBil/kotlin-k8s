[versions]
detekt = "1.23.8"
kotlin = "2.3.21"
ktlintGradle = "13.1.0"
pluginPublish = "1.3.1"
versionCheck = "0.54.0"

[plugins]
detekt = { id = "io.gitlab.arturbosch.detekt", version.ref = "detekt"}
kotlin = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin"}
ktlint = { id = "org.jlleitschuh.gradle.ktlint", version.ref = "ktlintGradle"}
pluginPublish = { id = "com.gradle.plugin-publish", version.ref = "pluginPublish"}
versionCheck = { id = "com.github.ben-manes.versions", version.ref = "versionCheck"}
kotlinxSerialization = { id = "org.jetbrains.kotlin.plugin.serialization", version = "2.3.20"}

[libraries]
junit = "junit:junit:4.13.2"
kotlinxSerializationJson = {module = "org.jetbrains.kotlinx:kotlinx-serialization-json", version = "1.11.0"}
yamlkt = {module = "net.mamoe.yamlkt:yamlkt", version = "0.13.0"}
